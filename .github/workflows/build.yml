name: Build NodeGuard

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            output: nodeguard-linux-amd64
          - os: macos-latest
            output: nodeguard-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          pip install pyinstaller
          pip install -r requirements.txt || true

      - run: |
          pyinstaller --onefile nodeguard.py --name nodeguard --collect-all requests

      - run: |
          mv dist/nodeguard dist/${{ matrix.output }}

      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          pip install awscli
          aws s3 cp dist/${{ matrix.output }} s3://tusaas-bucket/nodeguard/${{ matrix.output }}
